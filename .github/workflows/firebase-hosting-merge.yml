name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STRATA_MUSIC }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          set +e
          out=$(npx firebase-tools@latest deploy --only hosting --project strata-music --non-interactive 2>&1)
          code=$?
          echo "$out"
          if [ $code -eq 0 ]; then exit 0; fi
          if echo "$out" | grep -q "is the current active version"; then
            echo "::notice::No changes to deploy — built site is identical to the live version. Treating as success."
            exit 0
          fi
          exit $code
